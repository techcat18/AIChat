<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen flex bg-gray-100">

<aside class="w-64 bg-gray-900 text-white flex flex-col">
  <div class="p-4 border-b border-gray-700">
    <button class="w-full bg-blue-500 p-2 rounded">New Chat</button>
  </div>

  <div class="flex-1 p-2 space-y-2">
    <div class="p-3 rounded bg-gray-700">Hiking Trip</div>
    <div class="p-3 rounded hover:bg-gray-800">Meal Preparation</div>
    <div class="p-3 rounded hover:bg-gray-800">Ironman Plan</div>
  </div>
</aside>

<main class="flex-1 flex flex-col">

  <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

  <form id="chat-form" class="border-t bg-white p-4 flex gap-3">
    <textarea
      id="chat-input"
      class="flex-1 border rounded p-2 resize-none"
      rows="2"
      placeholder="Type your message..."
    ></textarea>

    <button class="bg-blue-500 text-white px-4 py-2 rounded">
      Send
    </button>
  </form>

</main>

<script type="module" src="main.js"></script>

</body>
</html>
